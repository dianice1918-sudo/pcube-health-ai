
services:
  - type: web
    name: pcube-health-ai
    runtime: docker
    rootDir: .
    dockerfilePath: Dockerfile
    dockerContext: .
    healthCheckPath: /healthz
    autoDeployTrigger: commit
    envVars:
      - key: APP_ENV
        value: production
      - key: ENABLE_SCHEDULER
        value: "false"
      - key: RUN_STARTUP_SCHEMA_PATCHES
        value: "false"
      - key: UVICORN_HOST
        value: 0.0.0.0
      - key: UVICORN_WORKERS
        value: "1"
      - key: ALLOWED_HOSTS
        value: pcube-health-ai.onrender.com
      - key: CORS_ALLOW_ORIGINS
        value: https://pcube-health-ai.onrender.com

