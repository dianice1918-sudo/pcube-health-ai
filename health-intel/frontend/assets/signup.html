<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>P-Cube Health AI | Sign Up</title>
    <meta
      name="description"
      content="Create your P-Cube Health AI account to access symptom checking, wellness tracking, and preventive health tools."
    />
    <meta
      name="keywords"
      content="P-Cube Health AI sign up, preventive health app registration, create health account"
    />
    <meta name="author" content="P-Cube Health AI" />
    <meta name="robots" content="noindex,nofollow,noarchive" />
    <meta name="theme-color" content="#2563eb" />
    <link rel="icon" href="/assets/pcube_logo.png" type="image/png" />
    <link rel="stylesheet" href="/assets/style.css" />
    <link rel="stylesheet" href="/assets/login.css" />
  </head>
  <body data-page="signup">
    <header class="header" role="banner">
      <div class="container header-inner">
        <div class="logo-wrapper">
          <a href="pcube.html" class="brand" aria-label="P-Cube Health AI home">
            <img src="/assets/pcube_logo.png" alt="P-Cube Health AI logo" class="logo" />
            <span class="site-name">P-Cube Health AI</span>
          </a>
        </div>

        <button
          class="nav-toggle"
          aria-controls="primary-navigation"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path
              d="M4 7h16M4 12h16M4 17h16"
              stroke="#fff"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            ></path>
          </svg>
        </button>

        <nav
          id="primary-navigation"
          class="primary-nav"
          role="navigation"
          aria-label="Main"
        >
          <ul class="nav-links">
            <li><a href="pcube.html" class="nav-link">Home</a></li>
            <li><a href="checker.html" class="nav-link">Checker</a></li>
            <li><a href="login.html" class="nav-link">Login</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main>
      <section class="container auth-section">
        <div class="auth-shell auth-shell--solo">
          <div class="auth-card auth-card--solo">
            <p class="auth-kicker auth-kicker-card">Sign up</p>
            <h1 class="auth-page-title">Create your account</h1>

            <form id="registerForm" autocomplete="off">
              <div class="field-group">
                <label for="register-name">Full name</label>
                <input
                  id="register-name"
                  type="text"
                  name="full_name"
                  placeholder="Your full name"
                  required
                />
              </div>

              <div class="field-group">
                <label for="register-email">Email</label>
                <input
                  id="register-email"
                  type="email"
                  name="email"
                  placeholder="you@example.com"
                  required
                />
              </div>

              <div class="field-group">
                <label for="register-password">Password</label>
                <div class="password-field">
                  <input
                    id="register-password"
                    type="password"
                    name="password"
                    placeholder="Create a password"
                    required
                  />
                  <button
                    type="button"
                    class="password-toggle"
                    data-toggle-password="register-password"
                    aria-label="Show password"
                  >
                    Show
                  </button>
                </div>
                <p class="field-hint">Use at least 8 characters with letters and numbers.</p>
              </div>

              <div class="field-group">
                <label for="register-confirm-password">Confirm password</label>
                <div class="password-field">
                  <input
                    id="register-confirm-password"
                    type="password"
                    name="confirm_password"
                    placeholder="Repeat your password"
                    required
                  />
                  <button
                    type="button"
                    class="password-toggle"
                    data-toggle-password="register-confirm-password"
                    aria-label="Show confirm password"
                  >
                    Show
                  </button>
                </div>
              </div>

              <button type="submit" class="btn redirect-action">
                <span class="redirect-label">Create account</span>
                <span class="redirect-icon" aria-hidden="true"></span>
              </button>
            </form>

            <p class="switch-text">
              Already registered?
              <a href="login.html">
                <span class="redirect-label">Sign in</span>
                <span class="redirect-icon" aria-hidden="true"></span>
              </a>
            </p>
            <p id="authOut" class="auth-message">Create your account to continue.</p>
          </div>
        </div>
      </section>
    </main>

    <script src="/assets/login.js?v=20260409a"></script>
  </body>
</html>
