<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>P-Cube Health AI | Login</title>
    <meta
      name="description"
      content="Secure sign in for the P-Cube Health AI health platform."
    />
    <meta
      name="keywords"
      content="P-Cube Health AI login, health platform sign in"
    />
    <meta name="author" content="P-Cube Health AI" />
    <meta name="robots" content="noindex,nofollow,noarchive" />
    <meta name="theme-color" content="#2563eb" />
    <link rel="icon" href="pcube_logo.png" type="image/png" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="login.css" />
  </head>
  <body data-page="login">
    <header class="header" role="banner">
      <div class="container header-inner">
        <div class="logo-wrapper">
          <a href="pcube.html" class="brand" aria-label="P-Cube Health AI home">
            <img src="pcube_logo.png" alt="P-Cube Health AI logo" class="logo" />
            <span class="site-name">P-Cube Health AI</span>
          </a>
        </div>

        <button
          class="nav-toggle"
          aria-controls="primary-navigation"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path
              d="M4 7h16M4 12h16M4 17h16"
              stroke="#fff"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            ></path>
          </svg>
        </button>

        <nav
          id="primary-navigation"
          class="primary-nav"
          role="navigation"
          aria-label="Main"
        >
          <ul class="nav-links">
            <li><a href="pcube.html" class="nav-link">Home</a></li>
            <li><a href="checker.html" class="nav-link">Checker</a></li>
            <li><a href="signup.html" class="nav-link">Sign up</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main>
      <section class="container auth-section">
        <div class="auth-shell auth-shell--solo">
          <div class="auth-card auth-card--solo">
            <p class="auth-kicker auth-kicker-card">Sign in</p>
            <h1 class="auth-page-title">Welcome back</h1>

            <form id="loginForm" autocomplete="off">
              <div class="field-group">
                <label for="login-email">Email</label>
                <input
                  id="login-email"
                  type="email"
                  name="email"
                  placeholder="you@example.com"
                  required
                />
              </div>

              <div class="field-group">
                <label for="login-password">Password</label>
                <div class="password-field">
                  <input
                    id="login-password"
                    type="password"
                    name="password"
                    placeholder="Enter your password"
                    required
                  />
                  <button
                    type="button"
                    class="password-toggle"
                    data-toggle-password="login-password"
                    aria-label="Show password"
                  >
                    Show
                  </button>
                </div>
              </div>

              <button type="submit" class="btn redirect-action">
                <span class="redirect-label">Continue</span>
                <span class="redirect-icon" aria-hidden="true"></span>
              </button>
            </form>

            <p class="switch-text">
              No account yet?
              <a href="signup.html">
                <span class="redirect-label">Create one</span>
                <span class="redirect-icon" aria-hidden="true"></span>
              </a>
            </p>
            <p id="authOut" class="auth-message">Sign in to continue.</p>
          </div>
        </div>
      </section>
    </main>

    <script src="login.js?v=20260409a"></script>
  </body>
</html>
