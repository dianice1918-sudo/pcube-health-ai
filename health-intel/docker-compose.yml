services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-pcube_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-pcube_db}"]
      interval: 10s
      timeout: 5s
      retries: 6

  api:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://postgres:postgres@db:5432/pcube_db}
      APP_ENV: ${APP_ENV:-production}
      ENABLE_DOCS: ${ENABLE_DOCS:-true}
      ENABLE_SCHEDULER: "false"
      UVICORN_WORKERS: ${UVICORN_WORKERS:-2}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-http://localhost:8000,http://127.0.0.1:8000}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "${API_PORT:-8000}:8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request,sys;sys.exit(0) if urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=5).status == 200 else sys.exit(1)\"",
        ]
      interval: 20s
      timeout: 6s
      retries: 5
      start_period: 20s

  scheduler:
    build: .
    restart: unless-stopped
    command: ["python", "-m", "app.worker_scheduler"]
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://postgres:postgres@db:5432/pcube_db}
      APP_ENV: ${APP_ENV:-production}
      JWT_SECRET: ${JWT_SECRET}

volumes:
  postgres_data:
